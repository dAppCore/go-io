version: "3"

tasks:
  build:
    dir: ../../..
    cmds:
      - go build ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...

  test-unit:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./... -run Unit

  test-integration:
    dir: ../../..
    cmds:
      - |
        if [ -z "${S3_ENDPOINT:-}" ] && [ -z "${AWS_ENDPOINT_URL_S3:-}" ] && [ -z "${AWS_ENDPOINT_URL:-}" ]; then
          echo "Skipping integration tests: S3 endpoint not set"
          exit 0
        fi
        go test -count=1 ./... -run Integration -tags integration

  default:
    deps:
      - build
      - test
      - vet
