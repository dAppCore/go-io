# Woodpecker CI pipeline for core/go-io.
# Server: ci.lthn.sh (homelab). Agent: same host, Docker backend.
#
# Steps (all depend only on clone — run in parallel where possible):
#   1. golangci-lint  — static analysis on all packages
#   2. go-test        — race + coverage; writes coverage.out
#   3. sonar          — code-quality scan against sonar.lthn.sh
#                       (depends_on: go-test so coverage.out is present)
#
# Secrets are admin-scoped (Woodpecker → Admin → Secrets):
#   sonar_token  — SonarQube auth token (cerberus identity)

when:
  - event: push
    branch: [dev, main]

steps:
  - name: golangci-lint
    image: golangci/golangci-lint:latest-alpine
    depends_on: []
    environment:
      GOFLAGS: -buildvcs=false
      GOWORK: "off"
    commands:
      - golangci-lint run --timeout=5m ./...

  - name: go-test
    image: golang:1.26-alpine
    depends_on: []
    environment:
      GOFLAGS: -buildvcs=false
      GOWORK: "off"
      CGO_ENABLED: "1"
    commands:
      - apk add --no-cache git build-base
      - go test -race -coverprofile=coverage.out -covermode=atomic -count=1 ./...

  - name: sonar
    image: sonarsource/sonar-scanner-cli:latest
    depends_on: [go-test]
    environment:
      SONAR_HOST_URL: https://sonar.lthn.sh
      SONAR_TOKEN:
        from_secret: sonar_token
    commands:
      - sonar-scanner
